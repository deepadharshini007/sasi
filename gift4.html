<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Little Movie 🤎</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>

/* RESET */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY */

body{

    height:100vh;

    overflow:hidden;

    position:fixed;

    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:30px;

    background:
    radial-gradient(circle at top,
    #5b3b2c 0%,
    #2f1d16 45%,
    #120c09 100%);

    font-family:'Caveat',cursive;

    position:relative;
}

/* FILM GRAIN */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
    url("https://www.transparenttextures.com/patterns/asfalt-dark.png");

    opacity:0.18;

    pointer-events:none;
}

/* MAIN */

.container{

    display:flex;

    align-items:center;

    justify-content:center;

    gap:60px;

    z-index:5;
}

/* LEFT */

.left{

    max-width:400px;
}

/* TITLE */

.title{

    color:#f2dfcf;

    font-size:4.3rem;

    line-height:1.1;

    font-family:'Playfair Display',serif;

    margin-bottom:14px;

    text-shadow:
    0 0 15px rgba(255,220,180,0.12);
}

/* SUBTITLE */

.subtitle{

    color:#d8bba4;

    font-size:1.6rem;

    line-height:1.5;

    letter-spacing:1px;
}

/* VIDEO FRAME */

.video-frame{

    width:340px;

    padding:14px 14px 10px 14px;

    background:#e9dbc8;

    border-radius:18px;

    position:relative;

    transform:rotate(-1deg);

    box-shadow:
    0 25px 60px rgba(0,0,0,0.65);

    animation:fadeUp 1.5s ease;
}

/* TAPE */

.tape{

    width:105px;
    height:24px;

    background:
    rgba(255,240,210,0.25);

    border:
    1px solid rgba(255,255,255,0.15);

    position:absolute;

    top:-12px;

    left:50%;

    transform:
    translateX(-50%)
    rotate(-3deg);

    backdrop-filter:blur(4px);
}

/* VIDEO */

video{

    width:100%;

    max-height:58vh;

    border-radius:10px;

    display:block;

    background:black;

    object-fit:cover;

    filter:
    sepia(18%)
    contrast(95%)
    brightness(90%);

    box-shadow:
    0 0 30px rgba(0,0,0,0.45);
}

/* NOTE */

.note{

    text-align:center;

    margin-top:8px;

    color:#5c4433;

    font-size:1.5rem;
}

/* COUNTER */

.counter{

    text-align:center;

    margin-top:3px;

    color:#8a6a54;

    font-size:1rem;
}

/* HEARTS */

.heart{

    position:absolute;

    color:#d9b7a3;

    opacity:0.45;

    pointer-events:none;

    animation:floatHeart linear forwards;
}

@keyframes floatHeart{

    0%{
        transform:
        translateY(0)
        scale(0.8);

        opacity:0;
    }

    20%{
        opacity:0.6;
    }

    100%{
        transform:
        translateY(-110vh)
        translateX(25px)
        scale(1.3);

        opacity:0;
    }
}

/* DUST */

.dust{

    position:absolute;

    width:4px;
    height:4px;

    background:rgba(255,255,255,0.12);

    border-radius:50%;

    animation:floatDust linear infinite;
}

@keyframes floatDust{

    from{
        transform:translateY(100vh);
    }

    to{
        transform:translateY(-120vh);
    }
}

/* FADE */

@keyframes fadeUp{

    from{
        opacity:0;
        transform:
        translateY(40px)
        rotate(-1deg);
    }

    to{
        opacity:1;
        transform:
        translateY(0)
        rotate(-1deg);
    }
}

/* MOBILE */

@media(max-width:900px){

    .container{

        flex-direction:column;

        gap:25px;

        text-align:center;
    }

    .title{
        font-size:3.2rem;
    }

    .subtitle{
        font-size:1.3rem;
    }

    .video-frame{
        width:290px;
    }

    video{
        max-height:46vh;
    }
}

</style>
</head>

<body>

<!-- DUST -->

<script>

for(let i=0;i<80;i++){

    let dust=document.createElement("div");

    dust.classList.add("dust");

    dust.style.left=Math.random()*100+"%";

    dust.style.animationDuration=
    (Math.random()*10+10)+"s";

    dust.style.opacity=Math.random();

    document.body.appendChild(dust);
}

</script>

<!-- HEARTS -->

<script>

setInterval(()=>{

    const heart=document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML="🤎";

    heart.style.left=
    Math.random()*100+"%";

    heart.style.bottom="-20px";

    heart.style.fontSize=
    (Math.random()*18+15)+"px";

    heart.style.animationDuration=
    (Math.random()*4+4)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{

        heart.remove();

    },8000);

},500);

</script>

<!-- MAIN -->

<div class="container">

    <!-- LEFT -->

    <div class="left">

        <div class="title">
            Our Little Movie 🎞
        </div>

        <div class="subtitle">
            some moments deserve to stay forever ✨
        </div>

    </div>

    <!-- RIGHT -->

    <div class="video-frame">

        <div class="tape"></div>

        <video id="movie" controls autoplay muted playsinline></video>

        <div class="note">
            made with love & memories 🤎
        </div>

        <div class="counter" id="counter">
            clip 1 / 3
        </div>

    </div>

</div>

<!-- VIDEO SCRIPT -->

<script>

const videos = [

    "video1.mp4",
    "video2.mp4",
    "video3.mp4",
    "video4.mp4"

];

let current = 0;

const player = document.getElementById("movie");

const counter = document.getElementById("counter");

/* PRELOAD ALL VIDEOS */

videos.forEach(video => {

    const preload = document.createElement("link");

    preload.rel = "preload";

    preload.as = "video";

    preload.href = video;

    document.head.appendChild(preload);

});

/* FIRST VIDEO */

player.src = videos[current];

player.play();

/* AUTO NEXT + LOOP */

player.addEventListener("ended", () => {

    current++;

    /* AGAIN FROM FIRST */

    if(current >= videos.length){

        current = 0;
    }

    /* SAVE CURRENT TIME */

    const nextSrc = videos[current];

    /* CHANGE SMOOTHLY */

    player.src = nextSrc;

    player.load();

    player.play();

    counter.innerHTML =
    `clip ${current + 1} / ${videos.length}`;

});

</script>

</body>
</html>
